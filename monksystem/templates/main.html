{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts: Figtree (headings) + Noto Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'base/css/bootstrap.min.css' %}">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="{% static 'base/css/bootstrap-icons.css' %}">
    <!-- MONK custom styles -->
    <link rel="stylesheet" href="{% static 'base/css/custom.css' %}">
    {% block extra_css %}{% endblock %}
    <title>{% block title %}MONK{% endblock %}</title>
  </head>

  <body>

    {% include "navbar.html" %}
    {% include "messages.html" %}

    <main role="main">
      {% block content %}
      {% endblock %}
    </main>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="{% static 'base/js/bootstrap.bundle.min.js' %}"></script>
    {% block scripts %}{% endblock %}

    {% if user.is_authenticated %}
    <script>
    /* Auto-logout after {{ IDLE_LOGOUT_SECONDS }}s of no mouse/keyboard activity. */
    (function () {
      var deadline = Date.now() + {{ IDLE_LOGOUT_SECONDS }} * 1000;
      function reset() { deadline = Date.now() + {{ IDLE_LOGOUT_SECONDS }} * 1000; }
      ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(function (e) {
        document.addEventListener(e, reset, { passive: true });
      });
      setInterval(function () {
        if (Date.now() >= deadline) {
          window.location.href = "{% url 'logout' %}";
        }
      }, 10000); /* check every 10 s */
    })();
    </script>
    {% endif %}

  </body>
</html>
